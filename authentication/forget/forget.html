<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password</title>
    <link rel="stylesheet" href="forget.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="../../imgs/logo.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <main id="content" role="main" class="w-full max-w-md mx-auto p-6">
      <div
        class="mt-7 bg-white rounded-xl shadow-lg border-2 border-indigo-300"
      >
        <div class="p-4 sm:p-7">
          <div class="text-center">
            <h1 class="block text-2xl font-bold text-gray-800">
              Forgot password?
            </h1>
            <p class="mt-2 text-sm text-gray-600">
              Remember your password?
              <a
                class="text-blue-600 decoration-2 hover:underline font-medium"
                href="../signin/signin.html"
              >
                Login here
              </a>
            </p>
          </div>
          <div class="mt-5">
            <form>
              <div>
                <label for="email" class="block text-sm font-bold mb-2"
                  >Email address</label
                >
                <div class="relative mb-6">
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="py-2 px-4 block w-full outline-0 border-2 border-blue-500 rounded-md text-md focus:border-blue-500 focus:ring-blue-500"
                    required
                  />
                </div>
              </div>
            </form>
            <button
              type="submit"
              class="w-full text-center cursor-pointer outline-0 py-3 px-4 gap-2 rounded-md border border-transparent font-semibold bg-indigo-600 text-white focus:outline-none transition-all text-sm"
              onclick="getData()"
            >
              Reset password
            </button>
          </div>
        </div>
      </div>
    </main>
    <script src="forget.js"></script>
  </body>
</html>
